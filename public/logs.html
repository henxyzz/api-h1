<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Logs</title>
    <style>
        /* === CYBER DARK MODE === */
        body {
            font-family: "Arial", sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        h1 {
            color: #58a6ff;
            font-size: 24px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .log-container {
            width: 90%;
            max-width: 800px;
            height: 400px;
            overflow-y: auto;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0px 0px 15px rgba(88, 166, 255, 0.2);
        }

        .log-container pre {
            font-size: 14px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .refresh-btn {
            margin-top: 15px;
            background: #238636;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s ease;
        }

        .refresh-btn:hover {
            background: #2ea043;
        }

        .status {
            margin-top: 10px;
            font-size: 12px;
            color: #8b949e;
        }
    </style>
</head>
<body>

    <h1>📜 Server Logs</h1>
    <div class="log-container">
        <pre id="log-content">Memuat log...</pre>
    </div>
    <button class="refresh-btn" onclick="loadLogs()">🔄 Refresh Logs</button>
    <p class="status" id="status"></p>

    <script>
        function loadLogs() {
            fetch("/api/logs")
                .then(response => response.json())
                .then(data => {
                    document.getElementById("log-content").innerText = data.join("\n") || "Log kosong.";
                    document.getElementById("status").innerText = "✅ Terakhir diperbarui: " + new Date().toLocaleTimeString();
                    const container = document.querySelector(".log-container");
                    container.scrollTop = container.scrollHeight;
                })
                .catch(error => {
                    document.getElementById("status").innerText = "⚠️ Gagal memuat log.";
                });
        }

        // Auto-refresh log setiap 3 detik
        setInterval(loadLogs, 3000);
        loadLogs();
    </script>

</body>
</html>
