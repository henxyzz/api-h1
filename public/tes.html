<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robotik Sci-Fi White Theme</title>
    <style>
        /* Reset some default styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Background dengan nuansa putih dan terang */
        body {
            font-family: 'Arial', sans-serif;
            background: #f5f5f5;
            color: #333;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Kontainer untuk konten */
        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        /* Teks Robotik dengan efek bayangan */
        .robotic-text {
            font-size: 3.5rem;
            font-weight: 700;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.1);
        }

        /* Panel dengan efek logam dan transparan */
        .robotic-panel {
            position: relative;
            margin-top: 3rem;
            background: rgba(255, 255, 255, 0.8);
            padding: 25px;
            border-radius: 8px;
            border: 2px solid #bbb;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2), inset 0 0 30px rgba(0, 0, 0, 0.1);
        }

        .robotic-panel .text {
            font-size: 1.6rem;
            color: #555;
            font-weight: 500;
            letter-spacing: 1px;
            line-height: 1.6;
        }

        /* Tombol dengan desain futuristik dan putih */
        .robotic-btn {
            padding: 15px 30px;
            font-size: 1.1rem;
            color: #fff;
            background-color: #0078d4;
            border: 2px solid #006bb3;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .robotic-btn:hover {
            background-color: #006bb3;
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        /* Efek mekanik di panel */
        .robotic-panel:before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, rgba(0, 0, 0, 0.1), rgba(255, 255, 255, 0.3));
            opacity: 0.5;
            z-index: -1;
            filter: blur(2px);
        }

        /* Desain garis dan detail minimalis */
        .robotic-line {
            border: 2px solid #ddd;
            width: 50%;
            margin: 20px auto;
            opacity: 0.6;
        }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="robotic-text">Robotik Sci-Fi</h1>
        </header>
        <main>
            <button class="robotic-btn">Explore</button>
            <div class="robotic-line"></div>
            <div class="robotic-panel">
                <p class="text">Welcome to the world of robotics and artificial intelligence!</p>
            </div>
        </main>
    </div>
</body>
</html>
